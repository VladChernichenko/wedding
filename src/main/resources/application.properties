spring.application.name=wedding-be

# Context path: app is served at /wedding
server.servlet.context-path=/wedding

# PostgreSQL. Defaults match docker-compose (port 5433, user postgres). Start DB: docker compose up -d
# For local PostgreSQL on 5432 set env: POSTGRES_USER, POSTGRES_PASSWORD (and optionally POSTGRES_URL with port 5432).
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5433/wedding}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA (schema managed by Flyway)
spring.jpa.hibernate.ddl-auto=validate

# Allow applying migration 1 if DB already has later migrations (e.g. from backup or different branch)
spring.flyway.out-of-order=true

# Messages: UTF-8 so Russian and Georgian letters work in .properties
spring.messages.encoding=UTF-8

# Login email confirmation (optional). Set APP_BASE_URL and mail props in production.
app.base-url=${APP_BASE_URL:http://localhost:8080/wedding}
app.mail.from=${MAIL_FROM:wedding@localhost}

# Mail (for login confirmation). Without these, mail sender may not be available.
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:25}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:false}
